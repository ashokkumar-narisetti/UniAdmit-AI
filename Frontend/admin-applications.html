<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - AI Admission System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--color-bg);
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar (Reused from dashboard) */
        .sidebar {
            width: 260px;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 40;
        }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--color-border); }
        .sidebar-nav { padding: 1rem 0; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem;
            color: var(--color-text-light); font-weight: 500; transition: all var(--transition-fast);
            border-left: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active { background: rgba(37, 99, 235, 0.05); color: var(--color-primary); }
        .nav-item.active { border-left-color: var(--color-primary); }
        .sidebar-footer { padding: 1.5rem; border-top: 1px solid var(--color-border); }

        .main-content {
            flex: 1; margin-left: 260px; display: flex; flex-direction: column;
        }
        
        .topbar {
            height: 70px; background: var(--color-surface); border-bottom: 1px solid var(--color-border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
            position: sticky; top: 0; z-index: 30;
        }

        .page-container {
            padding: 2rem;
        }

        .filters-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            font-family: var(--font-sans);
            outline: none;
            cursor: pointer;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            font-family: var(--font-sans);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--color-primary);
        }
        
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-top: 1px solid var(--color-border);
            background: var(--color-surface);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        .page-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .page-btn:hover { background: var(--color-bg); }
        .page-btn.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo text-lg">
                <i data-lucide="graduation-cap"></i>
                UniAdmit<span class="text-primary">Admin</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">
                <i data-lucide="layout-dashboard" size="20"></i> Dashboard
            </a>
            <a href="admin-applications.html" class="nav-item active">
                <i data-lucide="users" size="20"></i> Applications
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="file-text" size="20"></i> Reports
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="settings" size="20"></i> Settings
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item" style="padding: 0;">
                <i data-lucide="log-out" size="20"></i> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="font-bold text-lg">Application Management</div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">AD</div>
                </div>
            </div>
        </header>

        <div class="page-container">
            <div class="flex justify-between items-center mb-6">
                <h2 class="mb-0">All Applications</h2>
                <button class="btn btn-primary" style="padding: 0.5rem 1rem;">
                    <i data-lucide="download-cloud" size="18"></i> Export CSV
                </button>
            </div>

            <div class="card" style="padding: 0;">
                <div style="padding: 1.5rem;">
                    <div class="filters-bar">
                        <input type="text" class="search-input" placeholder="Search by name, email or ID...">
                        <select class="filter-select">
                            <option value="">All Statuses</option>
                            <option value="Submitted">Submitted</option>
                            <option value="Under Review">Under Review</option>
                            <option value="Approved">Approved</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                        <select class="filter-select">
                            <option value="">All Courses</option>
                            <option value="B.Tech">B.Tech</option>
                            <option value="BBA">BBA</option>
                            <option value="B.Sc">B.Sc</option>
                        </select>
                        <select class="filter-select">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                        </select>
                    </div>
                </div>

                <div class="table-container" style="border: none; border-radius: 0;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Applicant</th>
                                <th>Course</th>
                                <th>Date Applied</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="allApplicationsBody">
                            <!-- Populated via admin.js -->
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination">
                    <div class="text-sm text-text-light">Showing 1 to 5 of 2,451 entries</div>
                    <div class="flex gap-2">
                        <button class="page-btn">Previous</button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="page-btn">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
